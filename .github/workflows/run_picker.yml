name: Sequoia-X Daily Pick

on:
  schedule:
    # 每天周一到周五 北京时间 18:30 运行 (UTC 19:15)
    - cron: '15 11 * * 1-5'
  workflow_dispatch: # 允许你手动点击运行测试

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install . 

      - name: Run Stock Picker
        env:
          # 关键：将 GitHub Secrets 映射给程序环境变量
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          # 首次运行建议带上回填参数，确保数据完整
          python main.py --backfill
