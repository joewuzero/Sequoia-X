name: Sequoia-X Daily Pick

on:
  schedule:
    # 每天周一到周五 北京时间 18:30 运行 (UTC 19:15)
    - cron: '30 9 * * 1-5'
  workflow_dispatch: # 允许你手动点击运行测试

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 尝试直接安装当前项目及其依赖
          if [ -f pyproject.toml ]; then
            pip install .
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "未找到依赖文件，尝试强制安装通用依赖"
            pip install akshare loguru feishu-bot pandas
          fi

      - name: Run Stock Picker
        env:
          # 关键：将 GitHub Secrets 映射给程序环境变量
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          # 首次运行建议带上回填参数，确保数据完整
          python main.py
